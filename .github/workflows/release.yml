name: Publish

# Build, smoke-test, and publish to PyPI on tag push (e.g. v0.1.0).
# Uses PyPI Trusted Publishing (OIDC) — no API token in GitHub secrets.
#
# One-time setup (PyPI project admin):
#   PyPI -> project 'mink-warp' -> Publishing -> add trusted publisher
#     owner: simeon-ned   repo: mink-warp
#     workflow: release.yml   environment: pypi
#   (Pending publisher is OK before the first upload.)
#
# Release: see RELEASING.md

on:
  push:
    tags:
      - v*

jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/mink-warp
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Build
        run: uv build

      # MUJOCO_GL=disable so `import mujoco` skips GL on headless runners.
      - name: Smoke test (wheel)
        run: uv run --isolated --no-project --with dist/*.whl tests/smoke_test.py
        env:
          MUJOCO_GL: disable

      - name: Smoke test (source distribution)
        run: uv run --isolated --no-project --with dist/*.tar.gz tests/smoke_test.py
        env:
          MUJOCO_GL: disable

      - name: Publish
        run: uv publish
